name: CI (dev) — format, build, test, Trivy

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: read
  security-events: write

jobs:
  dotnet-quality:
    name: .NET quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore
      - name: Enforce formatting
        run: dotnet format --verify-no-changes
      - name: Build (warnings as errors)
        run: dotnet build -c Release -warnaserror
      - name: Test
        run: |
          if git ls-files "*Tests*.csproj" | grep -q ".csproj"; then
            for test_project in $(git ls-files "*Tests*.csproj"); do
              echo "Running tests for: $test_project"
              dotnet test "$test_project" -c Release --no-build --verbosity normal
            done
          else
            echo "No test projects found; skipping dotnet test"
          fi

  trivy:
    name: Trivy FS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.22.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        env:
          TRIVY_IGNORE_UNFIXED: true
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
